apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservice-engine-v1-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: microservice-engine-v1.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: microservice-engine-v1-service
            port:
              number: 80
